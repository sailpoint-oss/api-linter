sp-gateway:
  routes:
    - id: "access-request-test"
      path: "/access-request-path"
      service: "access-request-service"
      versionStart: 2024
      servicePath: "/test/access-request-administration"
      additionalVersions:
      - "beta"
      - "v3"
      routeType: "prefix"
      stripPrefix: true
      apiState: "limited-preview"

    - id: "subroute-test"
      service: "identity"
      path: "/subroute-path"
      routeType: "prefix"
      stripPrefix: true
      apiState: "public"
      versionStart: 2024
      additionalVersions:
        - "beta"
        - "v3"
      subroutes:
        "/some/route/{id}":
          rights: ["some-right"]
          methods: ["GET", "POST"]
          versions: ["v2024", "v2025", "beta", "v3"]
          rateLimit: 100
          rateLimitIntervalSeconds: 10
      versionDetailsMap:
        beta:
          apiState: "public"

    # Intentional violation: v2028 in versionDetailsMap is greater than versionEnd (2026) — expect gateway-route-version-details-map-keys-must-not-exceed-version-end
    - id: "version-details-map-exceeds-version-end"
      path: "/lint/version-details-map-vs-end"
      service: "identity"
      versionStart: 2024
      versionEnd: 2026
      routeType: "prefix"
      stripPrefix: true
      apiState: "public"
      versionDetailsMap:
        v2028:
          apiState: "public-preview"

    - id: "test-route"
      path: "/test-path"
      service: "identity"
      versionStart: 0
      routeType: "prefix"
      stripPrefix: true
      apiState: "public"
